name: KLab LIMS Docker Microservices Build and Push

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Ez kell a feltöltéshez

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Bejelentkezés a GHCR-be a GitHub-tól kapott ideiglenes jelszóval
      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- 1. SAMPLES SERVICE ---
      - name: Extract metadata for Samples Service
        id: meta-samples
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/klab-samples-service
          tags: |
            type=raw,value=latest
            type=ref,event=branch

      - name: Build and push Samples Service
        uses: docker/build-push-action@v5
        with:
          context: ./samples-service
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-samples.outputs.tags }}
          labels: ${{ steps.meta-samples.outputs.labels }}

      # --- 2. RESULTS SERVICE ---
      - name: Extract metadata for Results Service
        id: meta-results
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/klab-results-service
          tags: |
            type=raw,value=latest
            type=ref,event=branch

      - name: Build and push Results Service
        uses: docker/build-push-action@v5
        with:
          context: ./results-service
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-results.outputs.tags }}
          labels: ${{ steps.meta-results.outputs.labels }}

      # --- 3. MCP SERVER ---
      - name: Extract metadata for MCP Server
        id: meta-mcp
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/klab-mcp-server
          tags: |
            type=raw,value=latest
            type=ref,event=branch

      - name: Build and push MCP Server
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-server
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}

      # --- 4. FRONTEND ---
      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/klab-frontend
          tags: |
            type=raw,value=latest
            type=ref,event=branch

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          