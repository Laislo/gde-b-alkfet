name: KLab LIMS Docker CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  docker-build-check:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Lint with flake8
      run: |
        # A kritikus hibák (szintaxis, definiálatlan változók) megállítják a buildet
        flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics
        # A szépészeti hibák (túl hosszú sorok stb.) csak figyelmeztetnek, de átengedik a buildet
        flake8 backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Build Backend Image
      run: docker build ./backend --file ./backend/Dockerfile --tag klab-backend:test

    - name: Build Frontend Image
      run: docker build ./frontend --file ./frontend/Dockerfile --tag klab-frontend:test

    - name: Docker Compose Config Check
      run: docker compose config
