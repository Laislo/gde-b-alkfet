name: KLab LIMS Docker Microservices Build and Push

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'docker-compose.yml'
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Ez kell a feltöltéshez

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # PATHS FILTER: Megnézzük, melyik szerviz mappája változott
      - name: Check for changes in services
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            samples: ['samples-service/**']
            results: ['results-service/**']
            mcp: ['mcp-server/**']
            frontend: ['frontend/**']

      # Bejelentkezés a GHCR-be a GitHub-tól kapott ideiglenes jelszóval
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- SAMPLES SERVICE ---
      - name: Extract metadata for Samples
        if: steps.changes.outputs.samples == 'true'
        id: meta-samples
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/klab-samples-service
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,prefix=main-

      - name: Build and push Samples Service
        if: steps.changes.outputs.samples == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./samples-service
          push: true
          tags: ${{ steps.meta-samples.outputs.tags }}
          labels: ${{ steps.meta-samples.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- RESULTS SERVICE ---
      - name: Extract metadata for Results
        if: steps.changes.outputs.results == 'true'
        id: meta-results
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/klab-results-service
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,prefix=main-

      - name: Build and push Results Service
        if: steps.changes.outputs.results == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./results-service
          push: true
          tags: ${{ steps.meta-results.outputs.tags }}
          labels: ${{ steps.meta-results.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- MCP SERVER ---
      - name: Extract metadata for MCP
        if: steps.changes.outputs.mcp == 'true'
        id: meta-mcp
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/klab-mcp-server
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,prefix=main-

      - name: Build and push MCP Server
        if: steps.changes.outputs.mcp == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-server
          push: true
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- FRONTEND ---
      - name: Extract metadata for Frontend
        if: steps.changes.outputs.frontend == 'true'
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/klab-frontend
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,prefix=main-

      - name: Build and push Frontend
        if: steps.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          