apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: klab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
        - name: mcp-server
          image: ghcr.io/laislo/klab-mcp-server:latest
          ports:
            - containerPort: 8000
          env:
            - name: TZ
              value: "Europe/Budapest"
            - name: SAMPLES_API_URL
              value: "http://samples-service:8000"
            - name: RESULTS_API_URL
              value: "http://results-service:8000"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: ENV
              value: "production"
