apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: klab-lims
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Laislo/gde-b-alkfet
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: klab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
