apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: klab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/laislo/klab-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: TZ
              value: "Europe/Budapest"
