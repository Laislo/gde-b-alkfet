server {
    listen 80;

    # A frontend fájlok kiszolgálása
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

   # A minták kezelése a samples-service-hez megy
    location /api/samples {
        proxy_pass http://samples-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Az eredmények rögzítése a results-service-hez megy
    location /api/results {
        proxy_pass http://results-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /mcp/ {
        proxy_pass http://mcp-server:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SSE támogatáshoz szükséges extra beállítások:
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }
}