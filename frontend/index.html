<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>KLab LIMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🔬 KLab LIMS Dashboard</h1>
    
    <div class="card">
        <input id="drug" placeholder="Hatóanyag (pl. Algopyrin)">
        <input id="batch" placeholder="Sarzsszám">
        <div style="margin-top: 10px;">
            <label>Limit (%): </label>
            <input id="specMin" type="number" value="95.0" step="0.1" style="width: 60px;"> - 
            <input id="specMax" type="number" value="105.0" step="0.1" style="width: 60px;">
            <button onclick="save()">Regisztráció</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Lab ID</th>
                <th>Termék (Limit)</th>
                <th>Sarzsszám</th>
                <th>Státusz / Eredmény</th>
                <th>Művelet</th>
            </tr>
        </thead>
        <tbody id="target"></tbody>
    </table>

    <script>
        const API = `http://${window.location.hostname}:5000/api/samples`;

        async function load() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                const target = document.getElementById('target');
                
                target.innerHTML = data.map(s => `
                    <tr class="${s.status.toLowerCase()}">
                        <td><b>${s.labId}</b></td>
                        <td>
                            ${s.drugName} 
                            <small style="display:block; color:#666;">
                                (${s.specMin !== undefined ? s.specMin : 95}-${s.specMax !== undefined ? s.specMax : 105}%)
                            </small>
                        </td>
                        <td><code>${s.batchNumber}</code></td>
                        <td>
                            ${s.status} 
                            ${s.assayValue ? '| ' + s.assayValue + '%' : ''}
                            ${s.oosId ? `<br><b style="color:red">${s.oosId}</b>` : ''}
                        </td>
                        <td>
                            ${s.status === 'Pending' ? `<button onclick="measure('${s._id}')">Mérés</button>` : '🔒'}
                        </td>
                    </tr>`).join('');
            } catch (err) {
                console.error("Betöltési hiba:", err);
            }
        }

        async function save() {
            const drugName = document.getElementById('drug').value;
            const batchNumber = document.getElementById('batch').value;
            const specMin = parseFloat(document.getElementById('specMin').value);
            const specMax = parseFloat(document.getElementById('specMax').value);            
            
            // ELLENŐRZÉS: Ellentmondó határértékek szűrése
            if (specMin >= specMax) {
               alert("Hiba: A minimum limit nem lehet nagyobb vagy egyenlő a maximummal!");
               return; // Megállítjuk a folyamatot, nem küldünk kérést
            }

            if (!drugName || !batchNumber) {
                alert("Név és sarzsszám kötelező!");
                return;
            }

            const payload = {
                drugName: drugName,
                batchNumber: batchNumber,
                specMin: parseFloat(specMin),
                specMax: parseFloat(specMax)
            };

            // DEBUG: Nézzük meg a konzolon, mit küldünk el valójában!
            console.log("Küldött adatok:", payload);

            const response = await fetch(API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                // Mezők ürítése és frissítés
                document.getElementById('drug').value = '';
                document.getElementById('batch').value = '';
                load();
            } else {
                const errorDetail = await response.json();
                console.error("Szerver hiba:", errorDetail);
                alert("Hiba a mentésnél! Ellenőrizd a konzolt.");
            }
}

async function measure(id) {
    const input = prompt("Mért hatóanyag tartalom (%):");
    
    // Ha a felhasználó a Mégse gombra nyom vagy üresen hagyja
    if (input === null || input.trim() === "") return;

    const val = parseFloat(input.replace(',', '.')); // Kezeli a vesszőt és a pontot is

    if (isNaN(val)) {
        alert("Kérlek, csak számot adj meg!");
        return;
    }

    try {
        const response = await fetch(`${API}/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ assayValue: val })
        });

        if (response.ok) {
            load(); // Frissítjük a táblázatot
        } else {
            const err = await response.json();
            alert("Hiba a mentés során: " + (err.detail || "Ismeretlen hiba"));
        }
    } catch (error) {
        console.error("Hálózati hiba a mérésnél:", error);
        alert("Nem sikerült elérni a szervert!");
    }
}

        // Kezdő betöltés
        load();
    </script>
</body>
</html>
